<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <clipPath id="wss-round">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
    <linearGradient id="wss-text" x1="256" y1="96" x2="256" y2="416">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <filter id="wss-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g clip-path="url(#wss-round)">
    <rect width="512" height="512" fill="#000000"/>
    <circle cx="256" cy="256" r="250" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="4"/>
    <text
      x="256"
      y="318"
      text-anchor="middle"
      font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
      font-weight="900"
      font-size="272"
      fill="url(#wss-text)"
      letter-spacing="-14"
      filter="url(#wss-glow)"
    >WSS</text>
  </g>
</svg>
